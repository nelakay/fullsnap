<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 6px;
      color: #fff;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #888;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    #captureBtn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    #captureBtn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    #captureBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }
    .status {
      text-align: center;
      margin-top: 12px;
      font-size: 12px;
      color: #aaa;
      min-height: 16px;
    }
    .features {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #333;
      font-size: 11px;
      color: #777;
    }
    .features div {
      margin-bottom: 4px;
    }
    .features span {
      color: #667eea;
      margin-right: 4px;
    }
  </style>
</head>
<body>
  <h1>FullSnap</h1>
  <p class="subtitle">Full Page Screenshot</p>
  <button id="captureBtn">Capture Full Page</button>
  <p class="status" id="status"></p>
  <div class="features">
    <div><span>&#10003;</span> Full page capture</div>
    <div><span>&#10003;</span> Crop &amp; edit</div>
    <div><span>&#10003;</span> Save as PNG / PDF</div>
    <div><span>&#10003;</span> 100% free</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
